<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover"
    />
    <title>Gold Ticker | Full Width | Zero Border Radius | Dark Theme</title>
    <style>
      /* -------------------------------
       GLOBAL RESET — NO EXTERNAL MARGINS/PADDING
    ------------------------------- */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Dark background base — can be overridden externally, but keeps ticker context dark */
      body {
        background-color: #0a0e17; /* rich dark slate — matches widget dark theme */
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          sans-serif;
        line-height: 1.4;
        overflow-x: hidden;
      }

      /* The only wrapper: complete control, zero margin/padding, full viewport stretch */
      .gold-ticker-wrapper {
        display: block;
        width: 100%;
        max-width: 100%;
        margin: 0 !important;
        padding: 0 !important;
        background: transparent; /* allows parent background to flow, but container is solid via widget? widget uses isTransparent: true so background shows */
        border: none;
        border-radius: 0px !important;
        outline: none;
        box-shadow: none;
        overflow-x: auto; /* only for extreme narrow cases but ticker tape handles responsiveness */
        overflow-y: hidden;
      }

      /* Force TradingView container to be 100% width, no rounding, no spacing */
      .gold-ticker-wrapper .tradingview-widget-container {
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        line-height: 0;
        font-size: 0;
        border-radius: 0px !important;
        background: transparent;
        border: none !important;
      }

      /* Direct widget area — no extra padding or rounding */
      .gold-ticker-wrapper .tradingview-widget-container__widget {
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        border-radius: 0px !important;
        border: none !important;
      }

      /* Aggressive override for ANY element inside ticker (including iframes, canvas, divs, shadows) */
      .gold-ticker-wrapper *,
      .gold-ticker-wrapper *::before,
      .gold-ticker-wrapper *::after {
        border-radius: 0px !important;
        border-top-left-radius: 0px !important;
        border-top-right-radius: 0px !important;
        border-bottom-left-radius: 0px !important;
        border-bottom-right-radius: 0px !important;
        -webkit-border-radius: 0px !important;
        -moz-border-radius: 0px !important;
      }

      /* Specific iframe / widget element safety */
      .gold-ticker-wrapper iframe,
      .gold-ticker-wrapper embed,
      .gold-ticker-wrapper object,
      .gold-ticker-wrapper [class*="tradingview"],
      .gold-ticker-wrapper [class*="tv-"],
      .gold-ticker-wrapper [class*="ticker-tape"] {
        border-radius: 0px !important;
      }

      /* Full width without any margin/padding leakage — ensures no surrounding gaps */
      .gold-ticker-wrapper {
        width: 100% !important;
        min-width: 100% !important;
        max-width: 100% !important;
      }

      /* Remove any possible bottom/top spacing that might be added by TradingView script after load */
      .gold-ticker-wrapper > div {
        display: block;
        margin: 0;
        padding: 0;
      }

      /* Extra hardening: no negative margins or inherited spacing */
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #0a0e17; /* dark cohesive background */
      }

      /* --- LAYOUT: ticker sits flush with no surrounding whitespace --- */
      /* Optional spacer element is completely independent, does NOT affect ticker margins */
      .demo-spacer {
        height: 1px;
        background: transparent;
        margin: 0;
        padding: 0;
      }

      /* Additional override for any hidden borders that might appear on hover or dynamic injection */
      .gold-ticker-wrapper .tradingview-widget-container iframe,
      .gold-ticker-wrapper .tradingview-widget-container > div {
        border: none !important;
        outline: none !important;
      }

      /* Responsive improvements: ticker tape will adapt to small screens smoothly (no overflow issues) */
      @media (max-width: 640px) {
        .gold-ticker-wrapper {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }
        /* Ensure ticker content doesn't break, TradingView's adaptive mode handles it, but we guarantee scroll */
        .gold-ticker-wrapper .tradingview-widget-container {
          min-width: 100%;
        }
      }

      /* Remove any possible box-shadow or outline that might be injected by third party */
      .gold-ticker-wrapper,
      .gold-ticker-wrapper div,
      .gold-ticker-wrapper section {
        box-shadow: none !important;
        text-shadow: none !important;
      }
    </style>
  </head>
  <body>
    <!-- 
    GOLD TICKER – FULL WIDTH, ZERO BORDER RADIUS, DARK THEME, NO EXTERNAL PADDING/MARGIN.
    The wrapper ensures zero spacing around the widget. 
    'isTransparent': true allows background of body (dark) to be visible, 
    but the widget uses 'colorTheme': 'dark' for text and symbols.
  -->
    <div class="gold-ticker-wrapper" id="goldTickerRoot">
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script
          type="text/javascript"
          src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js"
          async
        >
          {
            "symbols": [
              {
                "proName": "OANDA:XAUUSD",
                "title": "Gold (XAU/USD)"
              },
              {
                "proName": "FX_IDC:USDINR",
                "title": "USD / INR"
              },
              {
                "proName": "OANDA:EURUSD",
                "title": "EUR / USD"
              },
              {
                "proName": "OANDA:GBPUSD",
                "title": "GBP / USD"
              }
            ],
            "showSymbolLogo": true,
            "isTransparent": true,
            "displayMode": "adaptive",
            "colorTheme": "dark",
            "locale": "en"
          }
        </script>
      </div>
    </div>

    <!-- 
    NO EXTRA MARGINS OR PADDING BELOW TICKER.
    The spacer is optional but demonstrates that no default gap exists.
    If you see any space, it's coming from external elements, not the ticker itself.
    This block is just to show separation but has ZERO effect on ticker's bottom margin.
  -->
    <div
      style="height: 0; margin: 0; padding: 0; background: transparent"
    ></div>

    <!-- 
    ADDITIONAL SAFETY: Observe DOM to ensure that any iframe or injected element 
    does not add margin/padding after loading. Also applies border-radius reset repeatedly.
  -->
    <script>
      (function () {
        "use strict";

        // Function to enforce zero border-radius on all elements inside ticker wrapper (dynamic protection)
        function enforceZeroBorderRadius() {
          const wrapper = document.getElementById("goldTickerRoot");
          if (!wrapper) return;

          // Recursively ensure every child and the wrapper itself has borderRadius = 0px
          const allElements = wrapper.querySelectorAll("*");
          allElements.forEach((el) => {
            if (el.style) {
              el.style.borderRadius = "0px";
              el.style.borderTopLeftRadius = "0px";
              el.style.borderTopRightRadius = "0px";
              el.style.borderBottomLeftRadius = "0px";
              el.style.borderBottomRightRadius = "0px";
            }
            // Also set via inline style to override any scripted rounding
            el.style.setProperty("border-radius", "0px", "important");
            el.style.setProperty("border-top-left-radius", "0px", "important");
            el.style.setProperty("border-top-right-radius", "0px", "important");
            el.style.setProperty(
              "border-bottom-left-radius",
              "0px",
              "important",
            );
            el.style.setProperty(
              "border-bottom-right-radius",
              "0px",
              "important",
            );
          });

          // wrapper itself
          wrapper.style.borderRadius = "0px";
          wrapper.style.setProperty("border-radius", "0px", "important");
        }

        // Remove any margin/padding that might appear on widget container after load
        function removeExtraSpacing() {
          const wrapper = document.getElementById("goldTickerRoot");
          if (!wrapper) return;

          // Force reset of all potential margin/padding on wrapper and children
          wrapper.style.margin = "0";
          wrapper.style.padding = "0";
          const container = wrapper.querySelector(
            ".tradingview-widget-container",
          );
          if (container) {
            container.style.margin = "0";
            container.style.padding = "0";
          }
          const widgetDiv = wrapper.querySelector(
            ".tradingview-widget-container__widget",
          );
          if (widgetDiv) {
            widgetDiv.style.margin = "0";
            widgetDiv.style.padding = "0";
          }

          // Additionally, if any iframe appears, set its style to block and remove extra space
          const iframes = wrapper.querySelectorAll("iframe");
          iframes.forEach((iframe) => {
            iframe.style.margin = "0";
            iframe.style.padding = "0";
            iframe.style.display = "block";
            iframe.style.verticalAlign = "bottom";
            iframe.style.border = "none";
          });
        }

        // MutationObserver to watch for dynamically injected nodes (TradingView often adds extra containers)
        function observeForDynamicChanges() {
          const wrapper = document.getElementById("goldTickerRoot");
          if (!wrapper) return;

          const observer = new MutationObserver(function (mutations) {
            let needsUpdate = false;
            mutations.forEach((mutation) => {
              if (
                mutation.type === "childList" ||
                mutation.type === "attributes"
              ) {
                needsUpdate = true;
              }
            });
            if (needsUpdate) {
              enforceZeroBorderRadius();
              removeExtraSpacing();
              // Also ensure any new iframe or div doesn't add border radius and clears margin
              const allDivs = wrapper.querySelectorAll(
                "div, iframe, section, article",
              );
              allDivs.forEach((el) => {
                if (el.style) {
                  el.style.margin = "0";
                  el.style.padding = "0";
                  el.style.borderRadius = "0px";
                }
              });
            }
          });

          observer.observe(wrapper, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ["style", "class"],
          });

          // Run once after script loads
          setTimeout(() => {
            enforceZeroBorderRadius();
            removeExtraSpacing();
          }, 100);
        }

        // Also run after window fully loads, including all TradingView scripts
        window.addEventListener("load", function () {
          enforceZeroBorderRadius();
          removeExtraSpacing();

          // Extra passes because TradingView injects progressively
          setTimeout(() => {
            enforceZeroBorderRadius();
            removeExtraSpacing();
          }, 300);

          setTimeout(() => {
            enforceZeroBorderRadius();
            removeExtraSpacing();
            // Additional safety: find any possible stray elements that add bottom margin
            const wrapper = document.getElementById("goldTickerRoot");
            if (wrapper && wrapper.parentElement) {
              // ensure no parent gap, but not modifying outer layout aggressively, just ticker boundaries
              wrapper.style.marginBottom = "0";
              wrapper.style.marginTop = "0";
            }
          }, 800);

          observeForDynamicChanges();
        });

        // Edge case: if TradingView loads faster, run immediately as well
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", () => {
            enforceZeroBorderRadius();
            removeExtraSpacing();
          });
        } else {
          enforceZeroBorderRadius();
          removeExtraSpacing();
        }
      })();
    </script>

    <!-- 
    Additional inline style guard: any style that might leak border radius from host page
    will be overwritten. This ensures that even if external CSS tries to add rounding,
    the ticker remains completely sharp, full width.
  -->
    <style>
      /* ULTIMATE OVERRIDE: high specificity to kill border radius anywhere inside ticker */
      div.gold-ticker-wrapper,
      div.gold-ticker-wrapper *,
      div.gold-ticker-wrapper *::before,
      div.gold-ticker-wrapper *::after,
      .gold-ticker-wrapper > .tradingview-widget-container,
      .gold-ticker-wrapper .tradingview-widget-container > div,
      .gold-ticker-wrapper iframe,
      .gold-ticker-wrapper object,
      .gold-ticker-wrapper embed {
        border-radius: 0px !important;
        -webkit-border-radius: 0px !important;
        -moz-border-radius: 0px !important;
        border-top-left-radius: 0px !important;
        border-top-right-radius: 0px !important;
        border-bottom-left-radius: 0px !important;
        border-bottom-right-radius: 0px !important;
        margin-top: 0px !important;
        margin-bottom: 0px !important;
        margin-left: 0px !important;
        margin-right: 0px !important;
        padding-top: 0px !important;
        padding-bottom: 0px !important;
        padding-left: 0px !important;
        padding-right: 0px !important;
      }

      /* Guarantee that wrapper itself has no negative or positive margins that create gap */
      .gold-ticker-wrapper {
        margin-block-start: 0em !important;
        margin-block-end: 0em !important;
        margin-inline-start: 0px !important;
        margin-inline-end: 0px !important;
        display: block;
        line-height: 0;
      }

      /* Remove any possible bottom space from ticker container sibling effect */
      body > .gold-ticker-wrapper {
        margin-bottom: 0 !important;
      }

      /* also avoid any default margin on TradingView generated ticker list */
      [class*="tv-ticker"],
      [class*="ticker"],
      [class*="tape"] {
        margin: 0 !important;
        padding: 0 !important;
      }

      /* Responsive touch: horizontal scroll only if needed, but ticker is adaptive */
      @media (max-width: 768px) {
        .gold-ticker-wrapper {
          overflow-x: auto;
          white-space: normal;
        }
        .gold-ticker-wrapper .tradingview-widget-container {
          min-width: 600px; /* ensures ticker content has enough room but adapts via wrapper overflow */
        }
      }

      /* For larger screens, force full width no overflow */
      @media (min-width: 769px) {
        .gold-ticker-wrapper {
          overflow-x: visible;
        }
      }
    </style>

    <!-- 
    FINAL VERIFICATION: If you notice any gap below the ticker, it is NOT from the widget or this code.
    The structure has zero margins and zero paddings. The background of body is dark, no extra elements.
    Any extra spacing would come from external page layout (like additional containers or line-height from body).
    We reset body line-height only for ticker parent but full control.
  -->
    <div style="display: none" aria-hidden="true">
      Gold Ticker — full width, zero border radius, dark theme, no gaps
    </div>
  </body>
</html>
